<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Surakarta Weather</title>
    <style>
      :root {
        --wallpaper: url(1101723.webp);
        --card-bg: rgba(14, 18, 24, 0.72);
        --text: #f5f7fb;
        --muted: #c5d0e6;
        --accent: #7bdff2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background: var(--wallpaper) center / cover no-repeat fixed;
        position: relative;
      }

      body::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at top, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.75));
      }

      .card {
        position: relative;
        width: min(90vw, 420px);
        padding: 28px;
        border-radius: 22px;
        background: var(--card-bg);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(8px);
        text-align: center;
      }

      .title {
        font-size: 20px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--accent);
      }

      .date {
        font-size: 22px;
        margin: 12px 0 18px;
      }

      .temp {
        font-size: 46px;
        font-weight: 700;
      }

      .desc {
        font-size: 18px;
        margin-top: 6px;
        color: var(--muted);
      }

      .note {
        margin-top: 20px;
        font-size: 12px;
        color: rgba(245, 247, 251, 0.7);
      }

      .uptime {
        position: fixed;
        left: 16px;
        bottom: 16px;
        font-size: 12px;
        color: rgba(245, 247, 251, 0.7);
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="title">Surakarta, Indonesia</div>
      <div class="date" id="date">Today is ...</div>
      <div class="temp" id="temp">--</div>
      <div class="desc" id="desc">Loading weather...</div>
    </div>

    <div class="uptime" id="uptime">Uptime: --</div>

    <script>
      const dateEl = document.getElementById("date");
      const tempEl = document.getElementById("temp");
      const descEl = document.getElementById("desc");
      const uptimeEl = document.getElementById("uptime");

      async function loadStatus() {
        const response = await fetch("/api/status");
        if (!response.ok) {
          throw new Error("Status API error");
        }

        return response.json();
      }

      loadStatus()
        .then((status) => {
          dateEl.textContent = `Today is ${status.today}`;
          tempEl.textContent = typeof status.temperature === "number"
            ? `${status.temperature.toFixed(1)} C`
            : "--";
          descEl.textContent = status.weatherText || "Unknown";
        })
        .catch(() => {
          dateEl.textContent = "Today is ...";
          descEl.textContent = "Failed to load weather";
        });

      function loadUptime() {
        fetch("/api/uptime")
          .then((response) => {
            if (!response.ok) {
              throw new Error("Uptime API error");
            }
            return response.json();
          })
          .then((data) => {
            const seconds = Number(data.uptimeSeconds);
            uptimeEl.textContent = Number.isFinite(seconds)
              ? `Uptime: ${seconds}s`
              : "Uptime: --";
          })
          .catch(() => {
            uptimeEl.textContent = "Uptime: --";
          });
      }

      loadUptime();
      setInterval(loadUptime, 10000);
    </script>
  </body>
</html>
