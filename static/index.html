<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Surakarta Weather</title>
    <style>
      :root {
        --wallpaper: url(1101723.jpg);
        --card-bg: rgba(13, 16, 24, 0.72);
        --text: #f6f6f9;
        --muted: #c5c9d6;
        --accent: #ffaf45;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background: var(--wallpaper) center / cover no-repeat fixed;
        position: relative;
      }

      body::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(160deg, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.7));
      }

      .card {
        position: relative;
        width: min(90vw, 420px);
        padding: 28px;
        border-radius: 22px;
        background: var(--card-bg);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(8px);
        text-align: center;
      }

      .title {
        font-size: 20px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--accent);
      }

      .date {
        font-size: 22px;
        margin: 12px 0 18px;
      }

      .temp {
        font-size: 46px;
        font-weight: 700;
      }

      .desc {
        font-size: 18px;
        margin-top: 6px;
        color: var(--muted);
      }

      .note {
        margin-top: 20px;
        font-size: 12px;
        color: rgba(246, 246, 249, 0.7);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="title">Surakarta, Indonesia</div>
      <div class="date" id="date">Today is ...</div>
      <div class="temp" id="temp">--</div>
      <div class="desc" id="desc">Loading weather...</div>
    </div>

    <script>
      const LAT = -7.5666;
      const LON = 110.8167;
      const TIMEZONE = "Asia/Jakarta";

      const WEATHER_CODES = {
        0: "Clear sky",
        1: "Mainly clear",
        2: "Partly cloudy",
        3: "Overcast",
        45: "Fog",
        48: "Depositing rime fog",
        51: "Light drizzle",
        53: "Drizzle",
        55: "Dense drizzle",
        56: "Light freezing drizzle",
        57: "Freezing drizzle",
        61: "Slight rain",
        63: "Rain",
        65: "Heavy rain",
        66: "Light freezing rain",
        67: "Freezing rain",
        71: "Slight snow",
        73: "Snow",
        75: "Heavy snow",
        77: "Snow grains",
        80: "Rain showers",
        81: "Rain showers",
        82: "Violent rain showers",
        85: "Snow showers",
        86: "Heavy snow showers",
        95: "Thunderstorm",
        96: "Thunderstorm with slight hail",
        99: "Thunderstorm with heavy hail"
      };

      function formatJakartaDate(date) {
        return new Intl.DateTimeFormat("en-US", {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
          timeZone: TIMEZONE
        }).format(date);
      }

      async function loadWeather() {
        const url = new URL("https://api.open-meteo.com/v1/forecast");
        url.searchParams.set("latitude", String(LAT));
        url.searchParams.set("longitude", String(LON));
        url.searchParams.set("current", "temperature_2m,weather_code");
        url.searchParams.set("timezone", TIMEZONE);

        const response = await fetch(url);
        if (!response.ok) {
          throw new Error("Weather API error");
        }

        const data = await response.json();
        return data.current || {};
      }

      const dateEl = document.getElementById("date");
      const tempEl = document.getElementById("temp");
      const descEl = document.getElementById("desc");

      dateEl.textContent = `Today is ${formatJakartaDate(new Date())}`;

      loadWeather()
        .then((current) => {
          const temp = typeof current.temperature_2m === "number"
            ? `${current.temperature_2m.toFixed(1)} C`
            : "--";
          const desc = WEATHER_CODES[current.weather_code] || "Unknown";

          tempEl.textContent = temp;
          descEl.textContent = desc;
        })
        .catch(() => {
          descEl.textContent = "Failed to load weather";
        });
    </script>
  </body>
</html>
